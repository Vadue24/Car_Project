{% extends 'main/layout.html' %}

{% block title %}Delete car{% endblock %}

{% block content %}
<div class="container-sm mb-4 bg-dark p-4 mx-auto" style="max-width: 600px; border-radius: 15px; margin-top: 100px;">
    <h1 class="text-white text-center">Are you sure you want to delete the car?</h1>
    <div class="container-fluid mt-4">
        <form method="post">
            {% csrf_token %}
            <div class="container text-center" style="margin-top: 50px;">
                <button class="btn btn-outline-danger" type="submit">Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
